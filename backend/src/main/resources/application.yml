spring:
  application:
    name: shop-inventory

  datasource:
    url: jdbc:h2:file:./data/shopdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mvc:
    cors:
      allowed-origins: "http://localhost:4200,http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

logging:
  level:
    root: INFO
    com.example.shop: DEBUG

server:
  port: 8080

app:
  jwt:
    secret: "shop-inventory-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
